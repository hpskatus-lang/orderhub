<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrderHub</title>
  <style>
    :root {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
      --border: #2e2e2e; --border2: #3a3a3a;
      --text: #e8e8e8; --text2: #888; --text3: #555;
      --green: #1D9E75; --green-dim: #0d3d2d;
      --blue: #378ADD; --blue-dim: #0c2240;
      --amber: #EF9F27; --amber-dim: #3d2800;
      --red: #E24B4A; --red-dim: #3d0f0f;
      --mono: 'IBM Plex Mono', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --nav-h: 56px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; padding-bottom: var(--nav-h); }
    .header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 16px; height: 50px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .header-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .header-firma { font-size: 12px; color: var(--text3); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .btn-refresh { background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 5px 10px; font-size: 12px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; }
    .btn-refresh:hover { color: var(--text); border-color: var(--text3); }
    .btn-refresh.loading { opacity: .4; pointer-events: none; }
    .btn-logout { background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 5px 10px; font-size: 12px; color: var(--text3); cursor: pointer; transition: all .15s; }
    .btn-logout:hover { color: var(--red); border-color: var(--red); }
    .nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-family: var(--sans); transition: color .15s; padding: 6px 0; }
    .nav-item .nav-ikoon { font-size: 20px; line-height: 1; }
    .nav-item.on { color: var(--green); }
    .nav-item:hover { color: var(--text2); }
    .vaade { display: none; }
    .vaade.on { display: block; }
    .stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .stat { background: var(--bg); padding: 14px 16px; }
    .stat-n { font-family: var(--mono); font-size: 24px; font-weight: 500; margin-bottom: 2px; }
    .stat-n.green { color: var(--green); }
    .stat-n.amber { color: var(--amber); }
    .stat-l { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
    .filter-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2); background: none; font-size: 12px; color: var(--text2); cursor: pointer; font-family: var(--sans); transition: all .12s; }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.on { background: var(--text); color: var(--bg); border-color: var(--text); }
    .filter-count { font-family: var(--mono); font-size: 10px; opacity: .6; margin-left: 3px; }
    .tellimus { border-bottom: 1px solid var(--border); padding: 12px 16px; cursor: pointer; transition: background .1s; }
    .tellimus:hover, .tellimus.open { background: var(--bg2); }
    .tellimus-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .tellimus-nimi { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .tellimus-meta { font-size: 11px; color: var(--text3); display: flex; gap: 6px; flex-wrap: wrap; }
    .tellimus-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .staatus { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
    .s-uus       { background: var(--blue-dim);  color: var(--blue);   border: 1px solid #1a3a5c; }
    .s-kinnitatud{ background: var(--green-dim); color: var(--green);  border: 1px solid #1a4a35; }
    .s-saadetud  { background: var(--green-dim); color: #5DCAA5;       border: 1px solid #1a4a35; }
    .s-probleem  { background: var(--red-dim);   color: var(--red);    border: 1px solid #5a1a1a; }
    .s-lahendatud{ background: var(--bg3);       color: var(--text3);  border: 1px solid var(--border2); }
    .tellimus-summa { font-family: var(--mono); font-size: 12px; color: var(--text2); }
    .toode-tag { font-size: 11px; padding: 2px 7px; border-radius: 3px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); font-family: var(--mono); margin-right: 4px; margin-bottom: 3px; display: inline-block; }
    .kanal-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg3); color: var(--text3); border: 1px solid var(--border); font-family: var(--mono); }
    .tellimus-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .tellimus.open .tellimus-detail { display: block; }
    .detail-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    .detail-table th { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; padding: 0 0 7px; text-align: left; border-bottom: 1px solid var(--border); }
    .detail-table td { padding: 7px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
    .detail-table td:last-child { text-align: right; color: var(--text2); font-family: var(--mono); }
    .detail-table tr:last-child td { border-bottom: none; }
    .detail-kokku { display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--border2); font-weight: 500; }
    .detail-kokku span:last-child { font-family: var(--mono); color: var(--green); }
    .detail-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .di { font-size: 12px; }
    .di .lbl { color: var(--text3); font-size: 11px; margin-bottom: 1px; }
    .staatus-muuda { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .st-btn { padding: 5px 11px; border-radius: 4px; border: 1px solid var(--border2); background: none; font-size: 11px; color: var(--text2); cursor: pointer; font-family: var(--sans); transition: all .12s; }
    .st-btn:hover { color: var(--text); border-color: var(--text3); }
    .st-btn.g { border-color: var(--green); color: var(--green); }
    .st-btn.g:hover { background: var(--green-dim); }
    .st-btn.r { border-color: var(--red); color: var(--red); }
    .st-btn.r:hover { background: var(--red-dim); }
    .toode-kaart { border-bottom: 1px solid var(--border); padding: 14px 16px; }
    .toode-kaart:hover { background: var(--bg2); }
    .toode-päis { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .toode-nimi { font-size: 14px; font-weight: 500; }
    .toode-hind { font-family: var(--mono); font-size: 13px; color: var(--green); }
    .toode-meta { font-size: 11px; color: var(--text3); display: flex; gap: 8px; flex-wrap: wrap; }
    .toode-suurused { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .sz-tag { font-size: 10px; padding: 2px 7px; border-radius: 3px; background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
    .toode-nupud { display: flex; gap: 6px; margin-top: 10px; }
    .toode-btn { padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border2); background: none; font-size: 12px; color: var(--text2); cursor: pointer; }
    .toode-btn:hover { color: var(--text); border-color: var(--text3); }
    .toode-btn.r { border-color: var(--red); color: var(--red); }
    .vorm-paneel { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px; }
    .vorm-pealkiri { font-size: 13px; font-weight: 500; margin-bottom: 14px; color: var(--text); }
    .väli { margin-bottom: 12px; }
    .väli label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 5px; }
    .väli input, .väli select { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-size: 14px; font-family: var(--sans); outline: none; transition: border-color .15s; }
    .väli input:focus { border-color: var(--blue); }
    .väli-rida { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-p { height: 40px; padding: 0 18px; background: var(--green); color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-s { height: 40px; padding: 0 14px; background: none; border: 1px solid var(--border2); border-radius: 7px; font-size: 13px; color: var(--text2); cursor: pointer; }
    .btn-nupud { display: flex; gap: 8px; }
    .seaded-sisu { padding: 16px; max-width: 560px; margin: 0 auto; padding-bottom: 80px; }
    .sektsioon { margin-bottom: 24px; }
    .sektsioon-pealkiri { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .sektsioon-pealkiri::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .seaded-kaart { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .seade-rida { display: flex; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); gap: 10px; }
    .seade-rida:last-child { border-bottom: none; }
    .seade-lbl { font-size: 13px; color: var(--text); flex: 1; }
    .seade-kirj { font-size: 11px; color: var(--text3); }
    .seade-inp { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 13px; font-family: var(--sans); outline: none; width: 200px; }
    .seade-inp:focus { border-color: var(--blue); }
    .seade-inp.mono { font-family: var(--mono); font-size: 11px; }
    .olek-badge { font-size: 10px; padding: 2px 7px; border-radius: 3px; }
    .olek-ok { background: var(--green-dim); color: var(--green); }
    .olek-tühi { background: var(--bg3); color: var(--text3); border: 1px solid var(--border2); }
    .mv-wrap { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 14px; }
    .mv-tag { display: flex; align-items: center; gap: 5px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 5px; padding: 4px 9px; font-size: 12px; color: var(--text2); }
    .mv-x { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }
    .mv-x:hover { color: var(--red); }
    .mv-lisa { display: flex; gap: 8px; padding: 0 14px 12px; }
    .mv-lisa input { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 13px; outline: none; }
    .mv-lisa input:focus { border-color: var(--blue); }
    .mv-lisa-btn { padding: 0 12px; background: none; border: 1px solid var(--border2); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 13px; white-space: nowrap; }
    .salv-riba { position: fixed; bottom: var(--nav-h); left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); padding: 10px 16px; display: none; justify-content: space-between; align-items: center; z-index: 99; }
    .salv-riba.naitab { display: flex; }
    .salv-olek { font-size: 13px; color: var(--text3); }
    .salv-olek.ok { color: var(--green); }
    .salv-olek.err { color: var(--red); }
    .salv-btn { height: 38px; padding: 0 20px; background: var(--green); color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .salv-btn:disabled { opacity: .5; cursor: not-allowed; }
    .haale-fab { position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px; width: 54px; height: 54px; border-radius: 50%; background: var(--green); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 16px rgba(29,158,117,.35); transition: all .2s; z-index: 98; }
    .haale-fab:hover { transform: scale(1.08); }
    .haale-fab.salvestab { background: var(--red); animation: hpulse 1s infinite; }
    .haale-fab.tootleb { background: var(--amber); }
    @keyframes hpulse { 0%,100%{box-shadow:0 4px 16px rgba(226,75,74,.35)} 50%{box-shadow:0 4px 28px rgba(226,75,74,.7)} }
    .haale-paneel { position: fixed; bottom: calc(var(--nav-h) + 80px); right: 12px; width: 290px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; padding: 14px; z-index: 98; display: none; box-shadow: 0 8px 28px rgba(0,0,0,.4); }
    .haale-paneel.naitab { display: block; }
    .haale-h { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .haale-olek { font-size: 11px; color: var(--text3); margin-bottom: 6px; min-height: 16px; }
    .haale-tekst { font-size: 12px; color: var(--text2); line-height: 1.6; min-height: 50px; font-style: italic; margin-bottom: 10px; }
    .haale-tulemus { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 9px 11px; margin-bottom: 10px; display: none; }
    .haale-tulemus.naitab { display: block; }
    .hr { font-size: 12px; color: var(--text2); margin-bottom: 3px; }
    .haale-nupud { display: flex; gap: 7px; }
    .haale-kinnita { flex: 1; height: 34px; background: var(--green); color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; display: none; }
    .haale-kinnita.naitab { display: block; }
    .haale-sulge { height: 34px; padding: 0 12px; background: none; border: 1px solid var(--border2); border-radius: 6px; font-size: 12px; color: var(--text3); cursor: pointer; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .laadimine { display: flex; align-items: center; gap: 10px; padding: 40px 16px; justify-content: center; color: var(--text3); font-size: 13px; }
    .tyhi { padding: 50px 16px; text-align: center; color: var(--text3); }
    .tyhi-nr { font-family: var(--mono); font-size: 40px; color: var(--border2); margin-bottom: 10px; }
    .viga-plokk { margin: 14px 16px; padding: 12px 14px; background: var(--red-dim); border: 1px solid #5a1a1a; border-radius: 7px; color: var(--red); font-size: 13px; }
    .toast { position: fixed; bottom: calc(var(--nav-h) + 10px); left: 50%; transform: translateX(-50%) translateY(60px); background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 9px 16px; font-size: 13px; color: var(--text); transition: transform .2s; z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { border-color: var(--green); color: var(--green); }
    .ver { text-align: center; font-size: 11px; color: var(--text3); padding: 20px 0 8px; font-family: var(--mono); }
    /* ─── Login leht ─── */
    .login-leht { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-kaart { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 28px; width: 300px; }
    .login-logo { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--green); text-align: center; margin-bottom: 6px; }
    .login-sub { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 24px; }
    .login-väli { margin-bottom: 12px; }
    .login-väli label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 5px; }
    .login-väli input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
    .login-väli input:focus { border-color: var(--blue); }
    .login-viga { font-size: 12px; color: var(--red); min-height: 18px; margin-bottom: 10px; text-align: center; }
    .login-btn { width: 100%; height: 42px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }
    @media (max-width: 480px) {
      .detail-info { grid-template-columns: 1fr; }
      .väli-rida { grid-template-columns: 1fr; }
      .seade-inp { width: 150px; }
    }
  </style>
</head>

<script>
(function() {
  'use strict';

  const cfg    = window.OHConfig || {};
  const SB_URL = cfg.supabaseUrl;
  const SB_KEY = cfg.supabaseKey;
  const VER    = cfg.versioon || 'v1.2';

  // ─── Olek — TID tuleb nüüd sessioonist, mitte konfiguratsioonist ──
  let S = {
    autentitud:  false,
    sessToken:   null,   // Supabase Auth JWT
    tarnijaId:   null,   // laetakse pärast sisselogimist kasutajad tabelist
    firmanimi:   '',     // laetakse tarnijad tabelist
    vaade:       'tellimused',
    tellimused:  [],
    tooted:      [],
    seaded:      {},
    makseviisid: ['Arve', 'Pangaülekanne', 'Sularaha'],
    filter:      'kõik',
    avatud:      null,
    toodevorm:   false,
    muudaToode:  null,
    laadimine:   false,
  };

  // ─── Supabase REST ────────────────────────────────────────────
  async function sb(endpoint, opts = {}) {
    // Kasuta Auth JWT-d kui olemas, muidu anon-võtit
    const authHeader = S.sessToken
      ? `Bearer ${S.sessToken}`
      : `Bearer ${SB_KEY}`;
    const r = await fetch(`${SB_URL}/rest/v1/${endpoint}`, {
      ...opts,
      headers: {
        'apikey': SB_KEY,
        'Authorization': authHeader,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer || 'return=representation',
        ...(opts.headers || {})
      }
    });
    if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
    const t = await r.text();
    return t ? JSON.parse(t) : null;
  }

  // ─── Supabase Auth API ────────────────────────────────────────
  async function sbAuth(path, body) {
    const r = await fetch(`${SB_URL}/auth/v1/${path}`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error_description || data.msg || 'Auth viga');
    return data;
  }

  // ─── Sisselogimine ────────────────────────────────────────────
  window.logi = async function() {
    const email  = document.getElementById('l-email').value.trim();
    const parool = document.getElementById('l-parool').value;
    const viga   = document.getElementById('l-viga');
    const btn    = document.getElementById('l-btn');
    if (!email || !parool) { viga.textContent = 'Sisesta email ja parool'; return; }
    btn.disabled = true;
    btn.textContent = 'Logen sisse...';
    viga.textContent = '';
    try {
      const data = await sbAuth('token?grant_type=password', { email, password: parool });
      S.sessToken = data.access_token;
      // Salvesta sessioon
      try { sessionStorage.setItem('oh_sess', JSON.stringify({ token: data.access_token, refresh: data.refresh_token })); } catch(e) {}
      await laeKasutajaProfiil();
      S.autentitud = true;
      renderdaPõhi();
      laeKõik();
    } catch(e) {
      viga.textContent = 'Vale email või parool';
      btn.disabled = false;
      btn.textContent = 'Sisene →';
    }
  };

  // ─── Väljalogmine ─────────────────────────────────────────────
  window.logi_valja = async function() {
    try { await sbAuth('logout', {}); } catch(e) {}
    S.autentitud = false;
    S.sessToken  = null;
    S.tarnijaId  = null;
    S.firmanimi  = '';
    try { sessionStorage.removeItem('oh_sess'); } catch(e) {}
    rend();
  };

  // ─── Lae kasutaja tarnija_id ja firma nimi ───────────────────
  async function laeKasutajaProfiil() {
    // 1. Leia kasutaja auth_id → tarnija_id
    const kasutaja = await sb(`kasutajad?auth_id=eq.${await haeAuthUID()}&select=tarnija_id,nimi`);
    if (!kasutaja || kasutaja.length === 0) throw new Error('Kasutaja profiil puudub');
    S.tarnijaId = kasutaja[0].tarnija_id;
    // 2. Leia firma nimi tarnijad tabelist
    const tarnija = await sb(`tarnijad?id=eq.${S.tarnijaId}&select=nimi`);
    S.firmanimi = (tarnija && tarnija[0]) ? tarnija[0].nimi : '';
  }

  async function haeAuthUID() {
    const r = await fetch(`${SB_URL}/auth/v1/user`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${S.sessToken}` }
    });
    const data = await r.json();
    return data.id;
  }

  // ─── Seaded ───────────────────────────────────────────────────
  async function laeSeaded() {
    if (!S.tarnijaId) return;
    try {
      const rows = await sb(`seaded?tarnija_id=eq.${S.tarnijaId}&select=voti,vaartus`);
      S.seaded = {};
      (rows || []).forEach(r => { S.seaded[r.voti] = r.vaartus || ''; });
      if (S.seaded.makseviisid) {
        S.makseviisid = S.seaded.makseviisid.split(',').map(s => s.trim()).filter(Boolean);
      }
    } catch(e) {
      console.warn('Seadete laadimine ebaõnnestus:', e.message);
    }
  }

  async function salvestaSeaded(uued) {
    for (const [voti, vaartus] of Object.entries(uued)) {
      const olemas = await sb(`seaded?tarnija_id=eq.${S.tarnijaId}&voti=eq.${encodeURIComponent(voti)}&select=id`);
      if (olemas && olemas.length > 0) {
        await sb(`seaded?tarnija_id=eq.${S.tarnijaId}&voti=eq.${encodeURIComponent(voti)}`, {
          method: 'PATCH', prefer: 'return=minimal',
          body: JSON.stringify({ vaartus, uuendatud: new Date().toISOString() })
        });
      } else {
        await sb('seaded', {
          method: 'POST', prefer: 'return=minimal',
          body: JSON.stringify({ tarnija_id: S.tarnijaId, voti, vaartus })
        });
      }
      S.seaded[voti] = vaartus;
    }
  }

  // ─── Andmete laadimine ────────────────────────────────────────
  window.laeKõik = async function() {
    if (!S.tarnijaId) return;
    const btn = document.getElementById('refresh-btn');
    if (btn) { btn.classList.add('loading'); }
    S.laadimine = true;
    try {
      const [tell, toot] = await Promise.all([
        sb(`tellimused?tarnija_id=eq.${S.tarnijaId}&select=*,tellimus_read(*)&order=loodud.desc`),
        sb(`tooted?tarnija_id=eq.${S.tarnijaId}&select=*&order=nimi.asc`)
      ]);
      S.tellimused = tell || [];
      S.tooted     = toot || [];
      await laeSeaded();
    } catch(e) {
      console.error('Laadimine ebaõnnestus:', e.message);
    } finally {
      S.laadimine = false;
      if (btn) btn.classList.remove('loading');
      rend();
    }
  };

  // ─── Renderdamine ─────────────────────────────────────────────
  function rend() {
    if (!S.autentitud) { renderdaLogin(); return; }
    renderdaPõhi();
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

    document.getElementById('app').innerHTML = `

          <div class="login-logo">OrderHub</div>

          <div class="login-väli">
            <label>Email</label>
            <input type="email" id="l-email" placeholder="sinu@email.com" autocomplete="email">
          </div>
          <div class="login-väli">
            <label>Parool</label>
            <input type="password" id="l-parool" placeholder="••••••••" autocomplete="current-password"
              onkeydown="if(event.key==='Enter')logi()">
          </div>
          <div class="login-viga" id="l-viga"></div>
          <button class="login-btn" id="l-btn" onclick="logi()">Sisene →</button>
        </div>
      </div>`;
  }

    const kanalid = [...new Set(S.tellimused.map(t => t.kanal).filter(Boolean))];

    document.getElementById('app').innerHTML = `
      <div class="header">
        <div class="header-logo">
          <div class="header-dot"></div>
          OrderHub
          <span class="header-firma" id="header-firma">${esc(firmanimi)}</span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${VER}</span>
        </div>
        <div class="header-right">
          <button class="btn-refresh" id="refresh-btn" onclick="laeKõik()">↻ Uuenda</button>

        </div>
      </div>

      <div class="vaade on" id="v-tellimused">

      <div class="vaade" id="v-tooted">
        ${renderdaTooted()}
      </div>

      <div class="vaade" id="v-seaded">
        ${renderdaSeaded()}
      </div>

      <nav class="nav">
        <button class="nav-item ${S.vaade==='tellimused'?'on':''}" onclick="navi('tellimused')">
          <span class="nav-ikoon">📦</span>Tellimused
        </button>
        <button class="nav-item ${S.vaade==='tooted'?'on':''}" onclick="navi('tooted')">
          <span class="nav-ikoon">🛍️</span>Tooted
        </button>
        <button class="nav-item ${S.vaade==='seaded'?'on':''}" onclick="navi('seaded')">
          <span class="nav-ikoon">⚙️</span>Seaded
        </button>
      </nav>

      <button class="haale-fab" id="haale-fab" onclick="haalePeale()" title="Häältellimus">🎤</button>
      <div class="haale-paneel" id="haale-paneel">
        <div class="haale-h">🎤 Häältellimus</div>
        <div class="haale-olek" id="haale-olek">Vajuta mikrofoni</div>
        <div class="haale-tekst" id="haale-tekst"></div>
        <div class="haale-tulemus" id="haale-tulemus">
          <div class="hr" id="haale-res"></div>
        </div>
        <div class="haale-nupud">
          <button class="haale-kinnita" id="haale-kinnita" onclick="haaleKinnita()">✓ Lisa tellimus</button>
          <button class="haale-sulge" onclick="haaleKinnita(false)">Sulge</button>
        </div>
      </div>

      <div class="salv-riba" id="salv-riba">
        <span class="salv-olek" id="salv-olek">Muudatused salvestamata</span>
        <button class="salv-btn" id="salv-btn" onclick="salvestaSeadedUI()">💾 Salvesta</button>
      </div>`;

    navi(S.vaade);
  }

  function renderdaStats(uued, tana, kanalid) {
    const tanaKaive = S.tellimused
      .filter(t => { const d=new Date(t.loodud),n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); })
      .reduce((s,t) => { const read=t.tellimus_read||[]; return s+read.reduce((rs,r)=>rs+(parseFloat(r.uhikhind||0)*parseFloat(r.kogus||0)),0); }, 0);
    return `<div class="stats">
      <div class="stat"><div class="stat-n green">${uued}</div><div class="stat-l">Uut tellimust</div></div>
      <div class="stat"><div class="stat-n">${tana}</div><div class="stat-l">Kokku täna</div></div>
      <div class="stat"><div class="stat-n amber">${tanaKaive > 0 ? tanaKaive.toFixed(2)+'€' : '—'}</div><div class="stat-l">Käive täna</div></div>
      <div class="stat"><div class="stat-n">${kanalid}</div><div class="stat-l">Kanalit</div></div>
    </div>`;
  }

  function renderdaFilter() {
    const loendid = { 'kõik': S.tellimused.length };
    ['uus','kinnitatud','saadetud','probleem'].forEach(st => {
      loendid[st] = S.tellimused.filter(t => t.staatus === st).length;
    });
    return `<div class="filter-bar">
      ${['kõik','uus','kinnitatud','saadetud','probleem'].map(f => `
        <button class="filter-btn ${S.filter===f?'on':''}" onclick="setFilter('${f}')">
          ${f.charAt(0).toUpperCase()+f.slice(1)}<span class="filter-count">${loendid[f]}</span>
        </button>`).join('')}
    </div>`;
  }

  function renderdaTellimused() {
    let list = S.filter === 'kõik' ? S.tellimused : S.tellimused.filter(t => t.staatus === S.filter);
    if (!list.length) return `<div class="tyhi"><div class="tyhi-nr">0</div>Tellimusi pole</div>`;
    return list.map((t,i) => {
      const read = t.tellimus_read || [];
      const summa = read.reduce((s,r) => s+(parseFloat(r.uhikhind||0)*parseFloat(r.kogus||0)),0);
      const kuup = new Date(t.loodud).toLocaleDateString('et-EE',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      const isOpen = S.avatud === t.id;
      return `<div class="tellimus ${isOpen?'open':''}" onclick="avaT(${t.id})">
        <div class="tellimus-top">
          <div>
            <div class="tellimus-nimi">${esc(t.klient_nimi||'Klient')}</div>
            <div class="tellimus-meta">
              <span>${kuup}</span>
              ${t.kanal?`<span class="kanal-tag">${esc(t.kanal)}</span>`:''}
              ${t.makseviis?`<span>${esc(t.makseviis)}</span>`:''}
            </div>
          </div>
          <div class="tellimus-right">
            <span class="staatus s-${t.staatus||'uus'}">${(t.staatus||'uus').toUpperCase()}</span>
            ${summa>0?`<span class="tellimus-summa">${summa.toFixed(2)}€</span>`:''}
          </div>
        </div>
        <div>${read.slice(0,3).map(r=>`<span class="toode-tag">${esc(r.toode_nimi||'')} ×${r.kogus}</span>`).join('')}${read.length>3?`<span class="toode-tag">+${read.length-3}</span>`:''}</div>
        ${isOpen ? renderdaTellDetail(t, read, summa) : ''}
      </div>`;
    }).join('');
  }

  function renderdaTellDetail(t, read, summa) {
    return `<div class="tellimus-detail">
      <table class="detail-table">
        <thead><tr><th>Toode</th><th>Suurus</th><th>Kogus</th><th>Hind</th></tr></thead>
        <tbody>${read.map(r=>`<tr>
          <td>${esc(r.toode_nimi||'')}</td>
          <td>${esc(r.suurus||'—')}</td>
          <td>${r.kogus}</td>
          <td>${parseFloat(r.uhikhind||0).toFixed(2)}€</td>
        </tr>`).join('')}</tbody>
      </table>
      ${summa>0?`<div class="detail-kokku"><span>Kokku</span><span>${summa.toFixed(2)}€</span></div>`:''}
      <div class="detail-info">
        <div class="di"><div class="lbl">Email</div>${esc(t.klient_email||'—')}</div>
        <div class="di"><div class="lbl">Telefon</div>${esc(t.klient_telefon||'—')}</div>
        <div class="di"><div class="lbl">Tellimus nr</div>${esc(t.tellimus_nr||'—')}</div>
        <div class="di"><div class="lbl">Märkus</div>${esc(t.markus||'—')}</div>
      </div>
      <div class="staatus-muuda">
        ${['uus','kinnitatud','saadetud','probleem','lahendatud'].map(st=>
          `<button class="st-btn ${st==='kinnitatud'||st==='saadetud'?'g':st==='probleem'?'r':''}"
            onclick="muudaStaatus(${t.id},'${st}');event.stopPropagation()">${st}</button>`
        ).join('')}
      </div>
    </div>`;
  }

  function renderdaTooted() {
    const vorm = S.toodevorm ? renderdaToodevorm() : `
      <div style="padding:14px 16px;border-bottom:1px solid var(--border)">
        <button class="btn-p" onclick="avatToodevorm()">+ Lisa toode</button>
      </div>`;
    const kaardid = S.tooted.map(t => `
      <div class="toode-kaart">
        <div class="toode-päis">
          <div class="toode-nimi">${esc(t.nimi)}</div>
          <div class="toode-hind">${t.hind!=null?parseFloat(t.hind).toFixed(2)+'€':''}</div>
        </div>
        <div class="toode-meta">
          <span>${esc(t.uhik||'')}</span>
          ${t.aktiivne?'<span style="color:var(--green)">aktiivne</span>':'<span style="color:var(--text3)">mitteaktiivne</span>'}
        </div>
        ${(t.suurused||[]).length?`<div class="toode-suurused">${t.suurused.map(s=>`<span class="sz-tag">${esc(s)}</span>`).join('')}</div>`:''}
        <div class="toode-nupud">
          <button class="toode-btn" onclick="muudaToode(${t.id})">✏️ Muuda</button>
          <button class="toode-btn r" onclick="kustutaToode(${t.id})">🗑️</button>
        </div>
      </div>`).join('');
    return vorm + (kaardid||`<div class="tyhi"><div class="tyhi-nr">0</div>Tooteid pole</div>`);
  }

  function renderdaToodevorm() {
    const m = S.muudaToode;
    return `<div class="vorm-paneel">
      <div class="vorm-pealkiri">${m?'Muuda toodet':'Lisa uus toode'}</div>
      <div class="väli"><label>Nimi</label><input id="t-nimi" value="${esc(m?m.nimi:'')}"></div>
      <div class="väli-rida">
        <div class="väli"><label>Hind (€)</label><input id="t-hind" type="number" step="0.01" value="${m&&m.hind!=null?m.hind:''}"></div>
        <div class="väli"><label>Ühik</label><input id="t-uhik" value="${esc(m?m.uhik||'':'tk')}"></div>
      </div>
      <div class="väli"><label>Suurused (komaga)</label><input id="t-sz" value="${esc(m&&m.suurused?(m.suurused||[]).join(', '):'')}" placeholder="500g, 1kg"></div>
      <div class="btn-nupud">
        <button class="btn-p" onclick="salvestaToode(${m?m.id:0})">${m?'Salvesta':'Lisa'}</button>
        <button class="btn-s" onclick="sulgeToodeVorm()">Tühista</button>
      </div>
    </div>`;
  }

  function renderdaSeaded() {
    const s = S.seaded;
    return `<div class="seaded-sisu">
      <div class="sektsioon">
        <div class="sektsioon-pealkiri">Firma info</div>
        <div class="seaded-kaart">
          <div class="seade-rida"><div class="seade-lbl">Firma nimi</div><input class="seade-inp" id="s-firma_nimi" value="${esc(s.firma_nimi||S.firmanimi||'')}" oninput="seadeMuutus()"></div>
          <div class="seade-rida"><div class="seade-lbl">Email</div><input class="seade-inp" id="s-firma_email" value="${esc(s.firma_email||'')}" oninput="seadeMuutus()"></div>
          <div class="seade-rida"><div class="seade-lbl">Telefon</div><input class="seade-inp" id="s-firma_telefon" value="${esc(s.firma_telefon||'')}" oninput="seadeMuutus()"></div>
          <div class="seade-rida"><div class="seade-lbl">Aadress</div><input class="seade-inp" id="s-firma_aadress" value="${esc(s.firma_aadress||'')}" oninput="seadeMuutus()"></div>
        </div>
      </div>
      <div class="sektsioon">
        <div class="sektsioon-pealkiri">Makseviisid</div>
        <div class="seaded-kaart">
          <div class="mv-wrap" id="mv-wrap">
            ${S.makseviisid.map(m=>`<div class="mv-tag">${esc(m)}<button class="mv-x" onclick="eemaldaMv('${esc(m)}')">×</button></div>`).join('')}
          </div>
          <div class="mv-lisa">
            <input id="mv-inp" placeholder="Lisa makseviis..." onkeydown="if(event.key==='Enter')lisaMv()">
            <button class="mv-lisa-btn" onclick="lisaMv()">+ Lisa</button>
          </div>
        </div>
      </div>
      <div class="sektsioon">
        <div class="sektsioon-pealkiri">Süsteem</div>
        <div class="seaded-kaart">
          <div class="seade-rida">
            <div><div class="seade-lbl">Tootja ID</div><div class="seade-kirj">Multi-tenant identifikaator</div></div>
            <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${S.tarnijaId||'—'}</span>
          </div>
          <div class="seade-rida">
            <div><div class="seade-lbl">Versioon</div></div>
            <span class="olek-badge olek-ok">${VER}</span>
          </div>
        </div>
      </div>
      <div class="ver">OrderHub ${VER} · ${esc(S.firmanimi||s.firma_nimi||'')}</div>
    </div>`;
  }

  // ─── Navigatsioon ─────────────────────────────────────────────
  window.navi = function(v) {
    S.vaade = v;
    ['tellimused','tooted','seaded'].forEach(id => {
      const el = document.getElementById('v-'+id);
      if (el) el.classList.toggle('on', id===v);
    });
    document.querySelectorAll('.nav-item').forEach((b,i) => {
      b.classList.toggle('on', ['tellimused','tooted','seaded'][i]===v);
    });
  };

  // ─── Tellimuste tegevused ─────────────────────────────────────
  window.avaT = function(id) {
    S.avatud = S.avatud === id ? null : id;
    document.getElementById('tellimuste-nimekiri').innerHTML = renderdaTellimused();
  };

  window.setFilter = function(f) {
    S.filter = f;
    document.querySelector('.filter-bar').outerHTML = renderdaFilter();
    document.getElementById('tellimuste-nimekiri').innerHTML = renderdaTellimused();
    renderdaPõhi(); // uuenda filter + nimekiri
  };

  window.muudaStaatus = async function(id, st) {
    try {
      await sb(`tellimused?id=eq.${id}&tarnija_id=eq.${S.tarnijaId}`, {
        method: 'PATCH', prefer: 'return=minimal',
        body: JSON.stringify({ staatus: st })
      });
      const t = S.tellimused.find(x => x.id === id);
      if (t) t.staatus = st;
      naita_toast('Staatus uuendatud', true);
      renderdaPõhi();
    } catch(e) {
      naita_toast('Viga: ' + e.message, false);
    }
  };

  // ─── Toodete tegevused ────────────────────────────────────────
  window.avatToodevorm  = function() { S.toodevorm=true; S.muudaToode=null; rend(); };
  window.sulgeToodeVorm = function() { S.toodevorm=false; S.muudaToode=null; rend(); };
  window.muudaToode     = function(id) { S.muudaToode=S.tooted.find(t=>t.id===id)||null; S.toodevorm=true; rend(); };

  window.salvestaToode = async function(id) {
    const nimi = document.getElementById('t-nimi').value.trim();
    const hind = document.getElementById('t-hind').value;
    const uhik = document.getElementById('t-uhik').value.trim();
    const sz   = document.getElementById('t-sz').value.split(',').map(s=>s.trim()).filter(Boolean);
    if (!nimi) { naita_toast('Nimi on kohustuslik'); return; }
    const andmed = { tarnija_id: S.tarnijaId, nimi, hind: hind?parseFloat(hind):null, uhik, suurused: sz, aktiivne: true };
    try {
      if (id) {
        await sb(`tooted?id=eq.${id}&tarnija_id=eq.${S.tarnijaId}`, { method:'PATCH', prefer:'return=minimal', body:JSON.stringify(andmed) });
      } else {
        await sb('tooted', { method:'POST', prefer:'return=minimal', body:JSON.stringify(andmed) });
      }
      S.toodevorm=false; S.muudaToode=null;
      naita_toast('Toode salvestatud', true);
      await laeKõik();
    } catch(e) { naita_toast('Viga: '+e.message); }
  };

  window.kustutaToode = async function(id) {
    if (!confirm('Kustuta toode?')) return;
    try {
      await sb(`tooted?id=eq.${id}&tarnija_id=eq.${S.tarnijaId}`, { method:'DELETE', prefer:'return=minimal' });
      naita_toast('Kustutatud', true);
      await laeKõik();
    } catch(e) { naita_toast('Viga: '+e.message); }
  };

  // ─── Seaded UI ────────────────────────────────────────────────
  window.seadeMuutus = function() {
    const riba = document.getElementById('salv-riba');
    if (riba) riba.classList.add('naitab');
  };

  window.lisaMv = function() {
    const inp = document.getElementById('mv-inp');
    const v = inp.value.trim();
    if (v && !S.makseviisid.includes(v)) {
      S.makseviisid.push(v);
      inp.value = '';
      seadeMuutus();
      document.getElementById('mv-wrap').innerHTML = S.makseviisid.map(m=>
        `<div class="mv-tag">${esc(m)}<button class="mv-x" onclick="eemaldaMv('${esc(m)}')">×</button></div>`
      ).join('');
    }
  };

  window.eemaldaMv = function(m) {
    S.makseviisid = S.makseviisid.filter(x=>x!==m);
    seadeMuutus();
    document.getElementById('mv-wrap').innerHTML = S.makseviisid.map(x=>
      `<div class="mv-tag">${esc(x)}<button class="mv-x" onclick="eemaldaMv('${esc(x)}')">×</button></div>`
    ).join('');
  };

  function val(id) { const e=document.getElementById(id); return e?e.value.trim():''; }

  window.salvestaSeadedUI = async function() {
    const btn  = document.getElementById('salv-btn');
    const olek = document.getElementById('salv-olek');
    btn.disabled = true;
    const uued = {
      firma_nimi:    val('s-firma_nimi'),
      firma_email:   val('s-firma_email'),
      firma_telefon: val('s-firma_telefon'),
      firma_aadress: val('s-firma_aadress'),
      makseviisid:   S.makseviisid.join(',')
    };
    try {
      await salvestaSeaded(uued);
      if (uued.firma_nimi) {
        S.firmanimi = uued.firma_nimi;
        const el = document.getElementById('header-firma');
        if (el) el.textContent = uued.firma_nimi;
      }
      olek.textContent='Salvestatud ✓'; olek.className='salv-olek ok';
      setTimeout(()=>{ document.getElementById('salv-riba')?.classList.remove('naitab'); },1500);
    } catch(e) {
      olek.textContent='Viga: '+e.message; olek.className='salv-olek err';
    } finally { btn.disabled=false; }
  };

  // ─── Häältellimus ─────────────────────────────────────────────
  let haaleTuvastus = null, haaleRes = null;

  window.haalePeale = function() {
    document.getElementById('haale-paneel').classList.toggle('naitab');
  };

  window.haaleAlusta = function() {
    const fab   = document.getElementById('haale-fab');
    const olek  = document.getElementById('haale-olek');
    const tekst = document.getElementById('haale-tekst');
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      olek.textContent = 'Brauser ei toeta kõnetuvastust';
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    haaleTuvastus = new SR();
    haaleTuvastus.lang = 'et-EE';
    haaleTuvastus.interimResults = true;
    fab.classList.add('salvestab');
    olek.textContent = '🔴 Salvestab...';
    haaleTuvastus.onresult = e => {
      tekst.textContent = Array.from(e.results).map(r=>r[0].transcript).join('');
    };
    haaleTuvastus.onend = () => {
      fab.classList.remove('salvestab');
      fab.classList.add('tootleb');
      olek.textContent = '⏳ Töötlen...';
      tootleHaaleKlaudesga(tekst.textContent);
    };
    haaleTuvastus.start();
  };

  async function tootleHaaleKlaudesga(tekst) {
    const fab  = document.getElementById('haale-fab');
    const olek = document.getElementById('haale-olek');
    const res  = document.getElementById('haale-tulemus');
    const resT = document.getElementById('haale-res');
    const kin  = document.getElementById('haale-kinnita');
    try {
      const tootedStr = S.tooted.map(t=>`${t.nimi} (${t.uhik||'tk'}, hind: ${t.hind||'?'}€)`).join('\n');
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key': S.seaded.claude_api_key||'','anthropic-version':'2023-06-01'},
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001', max_tokens:300,
          messages:[{role:'user',content:`Parsi see häältellimus JSON-iks.\nSaadaval tooted:\n${tootedStr}\n\nTellimus: "${tekst}"\n\nVasta AINULT JSON-iga: {"klient_nimi":"...","read":[{"toode":"...","kogus":1,"suurus":""}]}`}]
        })
      });
      const d = await r.json();
      const txt = d.content?.[0]?.text || '{}';
      haaleRes = JSON.parse(txt.replace(/```json|```/g,'').trim());
      resT.textContent = `Klient: ${haaleRes.klient_nimi||'?'} | ${(haaleRes.read||[]).map(r=>`${r.toode} ×${r.kogus}`).join(', ')}`;
      res.classList.add('naitab');
      kin.classList.add('naitab');
      olek.textContent = 'Kontrolli ja kinnita';
    } catch(e) {
      olek.textContent = 'Viga: '+e.message;
    } finally {
      fab.classList.remove('tootleb');
    }
  }

  window.haaleKinnita = async function(kinnita=true) {
    document.getElementById('haale-paneel').classList.remove('naitab');
    if (!kinnita || !haaleRes) return;
    try {
      const tell = await sb('tellimused', {
        method:'POST',
        body: JSON.stringify({
          tarnija_id: S.tarnijaId,
          klient_nimi: haaleRes.klient_nimi||'Tundmatu',
          kanal:'hääl', staatus:'uus', loodud: new Date().toISOString()
        })
      });
      const tid = tell?.[0]?.id;
      if (tid && haaleRes.read) {
        for (const r of haaleRes.read) {
          const t = S.tooted.find(x=>x.nimi.toLowerCase()===r.toode?.toLowerCase());
          await sb('tellimus_read', {
            method:'POST', prefer:'return=minimal',
            body:JSON.stringify({ tellimus_id:tid, toode_nimi:r.toode, toode_id:t?.id||null, kogus:r.kogus||1, suurus:r.suurus||null, uhikhind:t?.hind||null })
          });
        }
      }
      naita_toast('Häältellimus lisatud!', true);
      haaleRes = null;
      await laeKõik();
    } catch(e) { naita_toast('Viga: '+e.message); }
  };

  // ─── Toast ────────────────────────────────────────────────────
  function naita_toast(tekst, ok=false) {
    const t = document.getElementById('toast');
    t.textContent = tekst;
    t.className = 'toast' + (ok?' ok':'');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
  }

  // ─── Init ─────────────────────────────────────────────────────
  async function init() {
    document.getElementById('app').innerHTML = '<div class="laadimine"><div class="spinner"></div> Laen...</div>';
    // Proovi taastada sessioon
    try {
      const saved = sessionStorage.getItem('oh_sess');
      if (saved) {
        const sess = JSON.parse(saved);
        if (sess.token) {
          // Kontrolli kas token kehtib veel
          const r = await fetch(`${SB_URL}/auth/v1/user`, {
            headers:{ 'apikey':SB_KEY, 'Authorization':`Bearer ${sess.token}` }
          });
          if (r.ok) {
            S.sessToken = sess.token;
            await laeKasutajaProfiil();
            S.autentitud = true;
            renderdaPõhi();
            laeKõik();
            return;
          }
        }
      }
    } catch(e) {}
    renderdaLogin();
  }

  // Automaatne uuendus iga 60s
  setInterval(() => { if (S.autentitud && S.vaade==='tellimused') laeKõik(); }, 60000);

  init();
})();
</script>
