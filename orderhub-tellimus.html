    <script>
/**
 * Tellimisplugina v1.0
 * Üks JS fail — lisatakse igale lehele ühe script tagiga
 * Kõik stiilid on sees, ei vaja eraldi CSS faili
 */

(function () {
  'use strict';

  const cfg = window.TellimisPluginConfig || {};
  const SUPABASE_URL  = cfg.supabaseUrl  || '';
  const SUPABASE_KEY  = cfg.supabaseKey  || '';
  const TARNIJA_ID    = cfg.tarnijaId    || '';
  const TARNIJA_NIMI  = cfg.tarnijanimi  || 'Tarnija';
  const TARNIJA_EMAIL = cfg.tarnijaEmail || '';
  const EJS_SERVICE   = cfg.emailjsServiceId  || '';
  const EJS_TEMPLATE  = cfg.emailjsTemplateId || '';
  const EJS_KEY       = cfg.emailjsPublicKey  || '';
  const VALUUTA       = cfg.valuuta    || '€';
  const MAKSEVIISID   = cfg.makseviisid || ['Arve', 'Pangaülekanne', 'Sularaha'];
  const PAROOL        = cfg.parool     || '';
  const VERSIOON      = cfg.versioon   || 'v1.0';
  const LS_KEY        = 'tellimis_plugin_sessioon_v1';

  // ─── Olek ─────────────────────────────────────────────────────────────────
  let S = {
    samm: PAROOL ? 0 : 1,
    klient: { nimi: '', email: '', telefon: '' },
    tooted: [],
    korv: {},
    makseviis: MAKSEVIISID[0] || '',
    markus: '',
    topelt: null,
    laadimine: false,
    viga: '',
    tellimusId: null,
    meilViga: false,
  };

  // ─── Supabase ──────────────────────────────────────────────────────────────
  async function sb(endpoint, opts = {}) {
    if (!SUPABASE_URL || !SUPABASE_KEY) throw new Error('Supabase konfiguratsioon puudub');
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
      ...opts,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer !== undefined ? opts.prefer : 'return=representation',
        ...(opts.headers || {}),
      },
    });
    if (!r.ok) throw new Error(`SB ${r.status}: ${await r.text()}`);
    const t = await r.text();
    return t ? JSON.parse(t) : null;
  }

  async function sbLaeTooted() {
    return sb(`tooted?tarnija_id=eq.${TARNIJA_ID}&select=*&order=nimi.asc`);
  }

  async function sbSalvesta(d) {
    const tell = await sb('tellimused', {
      method: 'POST',
      body: JSON.stringify({
        tarnija_id: TARNIJA_ID,
        klient_nimi: d.nimi,
        klient_email: d.email,
        kanal: 'plugin',
        staatus: 'uus',
        makseviis: d.makseviis,
        markus: d.markus,
        loodud: new Date().toISOString(),
      }),
    });
    const id = tell[0].id;
    await sb('tellimus_read', {
      method: 'POST',
      body: JSON.stringify(d.read.map(r => ({
        tellimus_id: id, toode_id: r.toodeId,
        kogus: r.kogus, suurus: r.suurus || null, uhikhind: r.uhikhind || null,
      }))),
    });
    return id;
  }

  async function sbAsenda(tellimusId, read, markus) {
    await sb(`tellimus_read?tellimus_id=eq.${tellimusId}`, { method: 'DELETE', prefer: '' });
    await sb('tellimus_read', {
      method: 'POST',
      body: JSON.stringify(read.map(r => ({
        tellimus_id: tellimusId, toode_id: r.toodeId,
        kogus: r.kogus, suurus: r.suurus || null, uhikhind: r.uhikhind || null,
      }))),
    });
    if (markus) await sb(`tellimused?id=eq.${tellimusId}`, { method: 'PATCH', body: JSON.stringify({ markus }) });
    return tellimusId;
  }

  async function sbLisa(tellimusId, uued, markus) {
    const vanad = await sb(`tellimus_read?tellimus_id=eq.${tellimusId}&select=*`) || [];
    const komb = [...vanad];
    for (const u of uued) {
      const olemas = komb.find(v => v.toode_id === u.toodeId && v.suurus === (u.suurus || null));
      if (olemas) olemas.kogus += u.kogus;
      else komb.push({ tellimus_id: tellimusId, toode_id: u.toodeId, kogus: u.kogus, suurus: u.suurus || null, uhikhind: u.uhikhind || null });
    }
    await sb(`tellimus_read?tellimus_id=eq.${tellimusId}`, { method: 'DELETE', prefer: '' });
    await sb('tellimus_read', { method: 'POST', body: JSON.stringify(komb) });
    if (markus) await sb(`tellimused?id=eq.${tellimusId}`, { method: 'PATCH', body: JSON.stringify({ markus }) });
    return tellimusId;
  }

  async function sbTopelt(nimi) {
    const piir = new Date(Date.now() - 4 * 3600000).toISOString();
    const r = await sb(`tellimused?tarnija_id=eq.${TARNIJA_ID}&klient_nimi=eq.${encodeURIComponent(nimi)}&loodud=gte.${piir}&select=*&order=loodud.desc&limit=1`);
    return r && r.length > 0 ? r[0] : null;
  }

  // ─── EmailJS ───────────────────────────────────────────────────────────────
  function saadaMeil(params) {
    return new Promise((ok, fail) => {
      if (!window.emailjs) { fail(new Error('EmailJS puudub')); return; }
      emailjs.init(EJS_KEY);
      emailjs.send(EJS_SERVICE, EJS_TEMPLATE, params).then(ok).catch(fail);
    });
  }

  // ─── Abid ─────────────────────────────────────────────────────────────────
  function genNr() {
    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let n = 'SL-';
    for (let i = 0; i < 8; i++) n += c[Math.floor(Math.random() * c.length)];
    return n;
  }

  function fmt(h) {
    if (h === null || h === undefined || h === '') return '';
    return parseFloat(h).toFixed(2) + VALUUTA;
  }

  function summa() {
    return Object.values(S.korv).reduce((s, v) => s + (v.uhikhind ? v.kogus * parseFloat(v.uhikhind) : 0), 0);
  }

  function korvTuhi() {
    return Object.values(S.korv).every(v => !v.kogus || v.kogus === 0);
  }

  function read() {
    return Object.entries(S.korv)
      .filter(([, v]) => v.kogus > 0)
      .map(([key, v]) => {
        // Võti on "toodeId:suurus" või lihtsalt "toodeId"
        const parts = key.split(':');
        const toodeId = parts[0];
        const suurus = parts[1] || v.suurus || null;
        const t = S.tooted.find(x => String(x.id) === String(toodeId));
        return { toodeId: parseInt(toodeId) || toodeId, toodeNimi: t ? t.nimi : toodeId, kogus: v.kogus, suurus: suurus, uhikhind: v.uhikhind || null };
      });
  }

  function laeKlientLS() {
    try { const s = localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : null; } catch { return null; }
  }

  function salvestaKlientLS(k) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(k)); } catch {}
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function el(tag, cls) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }

  // Demo tooted kui Supabase pole seadistatud
  const DEMO_TOOTED = [
    { id: 't1', nimi: 'Toode A', suurused: ['S', 'M', 'L'], uhik: 'tk', hind_kg: 25.00 },
    { id: 't2', nimi: 'Toode B', suurused: [], uhik: 'kg', hind_kg: 12.50 },
    { id: 't3', nimi: 'Teenus C', suurused: ['Standard', 'Premium'], uhik: 'tk', hind_kg: 80.00 },
    { id: 't4', nimi: 'Toode D', suurused: ['Väike', 'Suur'], uhik: 'tk', hind_kg: null },
  ];

  function onDemoRezim() {
    return !SUPABASE_URL || !SUPABASE_KEY || !TARNIJA_ID ||
      TARNIJA_ID === 'ASENDA_OMA_TARNIJA_ID' || SUPABASE_URL === 'ASENDA_OMA_URL';
  }

  // ─── CSS ──────────────────────────────────────────────────────────────────
  function injectCSS() {
    if (document.getElementById('tp-css')) return;
    const s = document.createElement('style');
    s.id = 'tp-css';
    s.textContent = `

.tp-parool-wrap{max-width:300px;margin:0 auto;text-align:center;}
.tp-demo-banner{background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:10px 14px;color:#1e40af;font-size:13px;margin-bottom:14px;}

.tp-ver{text-align:center;font-size:12px;color:#ccc;margin-top:20px;padding-top:16px;border-top:1px solid #f2f2f2;}
`;
    document.head.appendChild(s);
  }

  // ─── Render ───────────────────────────────────────────────────────────────
  let ROOT = null;

  function rend() {
    if (!ROOT) return;
    ROOT.innerHTML = '';

    if (S.samm >= 1 && S.samm <= 3) ROOT.appendChild(rendSammud());

    if (S.viga) {
      const d = el('div', 'tp-viga');
      d.innerHTML = `<span>⚠</span><span>${esc(S.viga)}</span>`;
      ROOT.appendChild(d);
    }

    if (onDemoRezim() && S.samm >= 1 && S.samm <= 3) {
      const b = el('div', 'tp-demo-banner');
      b.textContent = '🔧 Demo režiim — Supabase pole seadistatud. Andmed ei salvestata.';
      ROOT.appendChild(b);
    }

    if (S.samm === 0) rendParool();
    else if (S.samm === 1) rendKlient();
    else if (S.samm === 2) rendTooted();
    else if (S.samm === 3) rendÜlevaade();
    else if (S.samm === 4) rendKinnitus();

    const ver = el('div', 'tp-ver');
    ver.textContent = `${TARNIJA_NIMI} · Tellimisplugina ${VERSIOON}`;
    ROOT.appendChild(ver);

    if (S.topelt && S.samm === 3) ROOT.appendChild(rendDialoog());
  }

  function rendSammud() {
    const w = el('div', 'tp-sammud');
    ['Kontakt', 'Tooted', 'Ülevaade'].forEach((n, i) => {
      const nr = i + 1;
      const s = el('div', 'tp-s');
      const c = el('div', `tp-snr ${S.samm > nr ? 'ok' : S.samm === nr ? 'ak' : ''}`);
      c.textContent = S.samm > nr ? '✓' : String(nr);
      s.appendChild(c);
      if (i < 2) {
        const j = el('div', `tp-sjonn ${S.samm > nr ? 'ok' : ''}`);
        s.appendChild(j);
      }
      w.appendChild(s);
    });
    return w;
  }

  function rendParool() {
    const k = el('div', 'tp-kaart tp-parool-wrap');
    k.innerHTML = `
      <div class="tp-h1" style="text-align:center">🔒 Kaitstud</div>
      <div class="tp-h2" style="text-align:center">Jätkamiseks sisesta parool</div>
      <div class="tp-väli"><input type="password" id="tp-pv" class="tp-inp" placeholder="Parool" style="text-align:center;font-size:20px;letter-spacing:4px;"></div>
    `;
    const btn = el('button', 'tp-btn tp-btn-p');
    btn.textContent = 'Jätka';
    btn.onclick = () => {
      const v = ROOT.querySelector('#tp-pv').value;
      if (v === PAROOL) {
        try { sessionStorage.setItem('tp_auth','1'); } catch {}
        S.samm = 1; S.viga = '';
      } else { S.viga = 'Vale parool, proovige uuesti'; }
      rend();
    };
    k.appendChild(btn);
    ROOT.appendChild(k);
    setTimeout(() => {
      const pv = ROOT.querySelector('#tp-pv');
      if (pv) { pv.focus(); pv.onkeydown = e => { if (e.key==='Enter') btn.click(); }; }
    }, 30);
  }

  function rendKlient() {
    const k = el('div', 'tp-kaart');
    k.innerHTML = `
      <div class="tp-h1">Teie andmed</div>
      <div class="tp-h2">Sisestage kontaktinfo tellimuse töötlemiseks</div>
      <div class="tp-väli"><label class="tp-lbl">Nimi <span style="color:#ef4444">*</span></label><input type="text" id="tp-nimi" class="tp-inp" placeholder="Täisnimi" value="${esc(S.klient.nimi)}" autocomplete="name"></div>
      <div class="tp-väli"><label class="tp-lbl">E-post</label><input type="email" id="tp-email" class="tp-inp" placeholder="nimi@firma.ee" value="${esc(S.klient.email)}" autocomplete="email"></div>
      <div class="tp-väli"><label class="tp-lbl">Telefon</label><input type="tel" id="tp-tel" class="tp-inp" placeholder="+372 5000 0000" value="${esc(S.klient.telefon)}" autocomplete="tel"></div>
    `;
    const btn = el('button', 'tp-btn tp-btn-p');
    btn.textContent = 'Jätka →';
    btn.onclick = async () => {
      const nimi = ROOT.querySelector('#tp-nimi').value.trim();
      if (!nimi) { S.viga = 'Palun sisestage oma nimi'; rend(); return; }
      S.klient = { nimi, email: ROOT.querySelector('#tp-email').value.trim(), telefon: ROOT.querySelector('#tp-tel').value.trim() };
      salvestaKlientLS(S.klient);
      S.viga = '';
      S.samm = 2;
      S.laadimine = true;
      rend();
      try {
        S.tooted = onDemoRezim() ? DEMO_TOOTED : (await sbLaeTooted() || []);
      } catch {
        S.viga = 'Toodete laadimine ebaõnnestus. Proovige uuesti.';
      }
      S.laadimine = false;
      rend();
    };
    k.appendChild(btn);
    ROOT.appendChild(k);
  }

  function rendTooted() {
    if (S.laadimine) {
      const w = el('div', 'tp-spinner-wrap');
      w.innerHTML = '<div class="tp-spinner"></div> Laen tooteid…';
      ROOT.appendChild(w); return;
    }
    const k = el('div', 'tp-kaart');
    k.innerHTML = '<div class="tp-h1">Valige tooted</div><div class="tp-h2">Lisage soovitud tooted ja kogused</div>';
    if (!S.tooted.length) { k.innerHTML += '<p style="color:#777;font-size:14px;">Tooteid ei leitud.</p>'; ROOT.appendChild(k); return; }

    const tw = el('div', 'tp-tooted');
    S.tooted.forEach(t => {
      const kv = S.korv[String(t.id)] || { kogus: 0, suurus: '', uhikhind: t.hind || t.hind_kg };
      const valitud = t.suurused && t.suurused.length ? t.suurused.some(s => (S.korv[String(t.id)+':'+s] || {}).kogus > 0) : (S.korv[String(t.id)] || {}).kogus > 0;
      const tc = el('div', `tp-toode ${valitud ? 'sel' : ''}`);

      const top = el('div', 'tp-toode-top');
      const nimi = el('div', 'tp-toode-nimi'); nimi.textContent = t.nimi;
      const hind = el('div', 'tp-toode-hind'); hind.textContent = (t.hind||t.hind_kg) ? `${fmt(t.hind||t.hind_kg)}/${t.uhik || 'tk'}` : '';
      top.appendChild(nimi); top.appendChild(hind); tc.appendChild(top);

      if (t.suurused && t.suurused.length) {
        // Iga suurus eraldi rida kogusega
        t.suurused.forEach(s => {
          const key = String(t.id) + ':' + s;
          const skv = S.korv[key] || { kogus: 0, uhikhind: t.hind || t.hind_kg };
          const sRida = el('div', 'tp-suurus-rida');
          const sNimi = el('div', 'tp-suurus-nimi'); sNimi.textContent = s;
          const qr2 = el('div', 'tp-qrow');
          const mb2 = el('button', 'tp-qbtn'); mb2.textContent = '−';
          mb2.onclick = () => { if (S.korv[key]) S.korv[key].kogus = Math.max(0, S.korv[key].kogus - 1); rend(); };
          const av2 = el('div', 'tp-qarv'); av2.textContent = String(skv.kogus || 0);
          const pb2 = el('button', 'tp-qbtn'); pb2.textContent = '+';
          pb2.onclick = () => {
            if (!S.korv[key]) S.korv[key] = { kogus: 0, uhikhind: t.hind || t.hind_kg };
            S.korv[key].kogus++; rend();
          };
          qr2.appendChild(mb2); qr2.appendChild(av2); qr2.appendChild(pb2);
          if (skv.kogus > 0 && (t.hind || t.hind_kg)) {
            const qs2 = el('div', 'tp-qsum');
            qs2.textContent = fmt(skv.kogus * (t.hind || t.hind_kg));
            qr2.appendChild(qs2);
          }
          sRida.appendChild(sNimi); sRida.appendChild(qr2);
          tc.appendChild(sRida);
        });
      } else {
        const key = String(t.id);
        const skv = S.korv[key] || { kogus: 0, uhikhind: t.hind || t.hind_kg };
        const qr = el('div', 'tp-qrow');
        const mb = el('button', 'tp-qbtn'); mb.textContent = '−';
        mb.onclick = () => { if (S.korv[key]) S.korv[key].kogus = Math.max(0, S.korv[key].kogus - 1); rend(); };
        const av = el('div', 'tp-qarv'); av.textContent = String(skv.kogus || 0);
        const pb = el('button', 'tp-qbtn'); pb.textContent = '+';
        pb.onclick = () => {
          if (!S.korv[key]) S.korv[key] = { kogus: 0, uhikhind: t.hind || t.hind_kg };
          S.korv[key].kogus++; rend();
        };
        qr.appendChild(mb); qr.appendChild(av); qr.appendChild(pb);
        if (skv.kogus > 0 && (t.hind || t.hind_kg)) {
          const qs = el('div', 'tp-qsum');
          qs.textContent = fmt(skv.kogus * (t.hind || t.hind_kg));
          qr.appendChild(qs);
        }
        tc.appendChild(qr);
      }
      tw.appendChild(tc);
    });
    k.appendChild(tw);
    ROOT.appendChild(k);

    // Sticky korv
    const korv = el('div', 'tp-korv');
    const arv = Object.values(S.korv).reduce((s, v) => s + (v.kogus || 0), 0);
    const sm = summa();
    const ki = el('div', 'tp-korv-inf');
    ki.innerHTML = `<strong>${arv} ${arv === 1 ? 'toode' : 'toodet'}</strong>${sm > 0 ? `<br><span class="tp-korv-sum">${fmt(sm)}</span>` : ''}`;
    const kb = el('button', 'tp-korv-btn');
    kb.textContent = 'Edasi →'; kb.disabled = korvTuhi();
    kb.onclick = () => { S.viga = ''; S.samm = 3; rend(); };
    korv.appendChild(ki); korv.appendChild(kb);
    ROOT.appendChild(korv);
  }

  function rendÜlevaade() {
    const k = el('div', 'tp-kaart');
    k.innerHTML = '<div class="tp-h1">Tellimuse ülevaade</div>';

    const rr = read();
    const tbl = el('div', 'tp-üle-table');
    let tot = 0; let hinnad = false;
    rr.forEach(r => {
      const row = el('div', 'tp-üle-r');
      const n = el('div'); n.textContent = `${r.toodeNimi}${r.suurus ? ` (${r.suurus})` : ''} × ${r.kogus}`;
      row.appendChild(n);
      if (r.uhikhind) {
        hinnad = true;
        const h = r.kogus * parseFloat(r.uhikhind); tot += h;
        const hd = el('div'); hd.style.fontWeight = '600'; hd.textContent = fmt(h);
        row.appendChild(hd);
      }
      tbl.appendChild(row);
    });
    if (hinnad) {
      const totR = el('div', 'tp-üle-r tot');
      const tl = el('div'); tl.textContent = 'Kokku';
      const tv = el('div'); tv.textContent = fmt(tot);
      totR.appendChild(tl); totR.appendChild(tv); tbl.appendChild(totR);
    }
    k.appendChild(tbl);

    // Makseviis
    const mvl = el('label', 'tp-lbl'); mvl.textContent = 'Makseviis';
    k.appendChild(mvl);
    const mvw = el('div', 'tp-mv-wrap');
    MAKSEVIISID.forEach(mv => {
      const b = el('button', `tp-mv ${S.makseviis === mv ? 'sel' : ''}`);
      b.textContent = mv; b.onclick = () => { S.makseviis = mv; rend(); };
      mvw.appendChild(b);
    });
    k.appendChild(mvw);

    // Märkus
    const md = el('div', 'tp-väli');
    const ml = el('label', 'tp-lbl'); ml.textContent = 'Lisainfo / märkused (valikuline)';
    const ta = el('textarea', 'tp-inp');
    ta.placeholder = 'Tarneinfo, soovid vm…';
    ta.value = S.markus; ta.oninput = () => { S.markus = ta.value; };
    md.appendChild(ml); md.appendChild(ta); k.appendChild(md);

    // Nupud
    const brow = el('div', 'tp-btnrow');
    const tag = el('button', 'tp-btn tp-btn-s');
    tag.textContent = '← Tagasi'; tag.style.width = 'auto';
    tag.onclick = () => { S.samm = 2; S.viga = ''; rend(); };

    const saada = el('button', 'tp-btn tp-btn-p');
    saada.textContent = S.laadimine ? 'Saadan…' : 'Saada tellimus';
    saada.disabled = S.laadimine;
    saada.onclick = async () => {
      S.viga = ''; S.laadimine = true; rend();
      try {
        if (!onDemoRezim()) {
          const tp = await sbTopelt(S.klient.nimi);
          if (tp) { S.topelt = tp; S.laadimine = false; rend(); return; }
        }
        await esita('uus');
      } catch {
        S.laadimine = false; S.viga = 'Viga tellimuse saatmisel. Proovige uuesti.'; rend();
      }
    };
    brow.appendChild(tag); brow.appendChild(saada); k.appendChild(brow);
    ROOT.appendChild(k);
  }

  function rendDialoog() {
    const taust = el('div', 'tp-dialoogi-taust');
    const d = el('div', 'tp-dialoogi');
    d.innerHTML = `<div class="tp-dialoogi-h">Leidsime eelmise tellimuse</div><div class="tp-dialoogi-t">${esc(S.klient.nimi)} esitas tellimuse hiljuti. Mida soovite teha?</div>`;
    const nw = el('div', 'tp-dialoogi-nupud');

    const mkBtn = (tekst, klass, cb) => {
      const b = el('button', `tp-dbn ${klass}`);
      b.textContent = tekst; b.onclick = cb; nw.appendChild(b);
    };
    mkBtn('➕  Lisa eelmisele tellimusele', 'p', async () => { taust.remove(); await esita('lisa'); });
    mkBtn('🔄  Asenda eelmine tellimus', '', async () => { taust.remove(); await esita('asenda'); });
    mkBtn('🆕  Esita uus eraldi tellimus', '', async () => { S.topelt = null; taust.remove(); await esita('uus'); });
    d.appendChild(nw); taust.appendChild(d);
    return taust;
  }

  async function esita(viis) {
    S.laadimine = true; S.viga = ''; rend();
    const rr = read();
    let id = null; let meilViga = false;

    try {
      if (onDemoRezim()) {
        id = genNr();
        await new Promise(r => setTimeout(r, 600)); // demo viivitus
      } else if (viis === 'lisa' && S.topelt) {
        id = await sbLisa(S.topelt.id, rr, S.markus);
      } else if (viis === 'asenda' && S.topelt) {
        id = await sbAsenda(S.topelt.id, rr, S.markus);
      } else {
        id = await sbSalvesta({ nimi: S.klient.nimi, email: S.klient.email, makseviis: S.makseviis, markus: S.markus, read: rr });
      }
    } catch {
      S.laadimine = false; S.viga = 'Tellimuse salvestamine ebaõnnestus. Proovige uuesti.'; rend(); return;
    }

    try {
      if (EJS_SERVICE && EJS_SERVICE !== 'ASENDA' && S.klient.email) {
        await saadaMeil({
          klient_nimi: S.klient.nimi, klient_email: S.klient.email,
          tellimus_nr: id,
          tooted_nimekiri: rr.map(r => `${r.toodeNimi}${r.suurus ? ` (${r.suurus})` : ''} × ${r.kogus}${r.uhikhind ? ` = ${fmt(r.kogus * r.uhikhind)}` : ''}`).join('\n'),
          kogusumma: fmt(summa()), makseviis: S.makseviis, markus: S.markus || '—',
          tarnija_nimi: TARNIJA_NIMI, tarnija_email: TARNIJA_EMAIL,
          kuupaev: new Date().toLocaleDateString('et-EE'),
        });
      }
    } catch { meilViga = true; }

    S.laadimine = false; S.samm = 4;
    S.tellimusId = id; S.meilViga = meilViga; S.topelt = null;
    rend();
  }

  function rendKinnitus() {
    const k = el('div', 'tp-kaart tp-kin');
    const rr = read();
    const sm = summa();

    k.innerHTML = `
      <div class="tp-kin-ikoon">✓</div>
      <h2 style="font-size:24px;font-weight:700;color:#14532d;margin:0 0 6px;">Täname!</h2>
      <p style="font-size:15px;color:#555;margin:0 0 0;">${S.klient.email ? 'Tellimus on esitatud. Kinnitus saadeti e-postile.' : 'Tellimus on edukalt esitatud.'}</p>
      <div class="tp-kin-nr">
        <div class="tp-kin-nr-l">Tellimuse number</div>
        <div class="tp-kin-nr-v">${esc(String(S.tellimusId))}</div>
      </div>
      <div class="tp-kin-kokk">
        <div style="font-size:13px;color:#777;margin-bottom:8px;">Tellitud:</div>
        ${rr.map(r => `<div style="font-size:14px;margin-bottom:4px;">• ${esc(r.toodeNimi)}${r.suurus ? ` (${esc(r.suurus)})` : ''} × ${r.kogus}${r.uhikhind ? ` — ${fmt(r.kogus * r.uhikhind)}` : ''}</div>`).join('')}
        ${sm > 0 ? `<div style="font-size:15px;font-weight:700;margin-top:10px;border-top:1px solid #eee;padding-top:8px;">Kokku: ${fmt(sm)}</div>` : ''}
        <div style="font-size:13px;color:#777;margin-top:8px;">Makseviis: ${esc(S.makseviis)}</div>
        ${S.markus ? `<div style="font-size:13px;color:#777;margin-top:3px;">Märkus: ${esc(S.markus)}</div>` : ''}
      </div>
    `;

    if (S.meilViga) {
      const h = el('div', 'tp-hoiatus');
      h.textContent = `Kinnitusmeil ei saadetud. Võtke ühendust: ${TARNIJA_EMAIL || 'tarnijaga'}`;
      k.appendChild(h);
    }

    const btn = el('button', 'tp-btn tp-btn-s');
    btn.textContent = '↺ Telli uuesti';
    btn.style.marginTop = '4px';
    btn.onclick = () => {
      S.korv = {}; S.makseviis = MAKSEVIISID[0] || ''; S.markus = '';
      S.samm = 1; S.viga = ''; S.tellimusId = null;
      rend();
    };
    k.appendChild(btn);
    ROOT.appendChild(k);
  }

  // ─── Init ─────────────────────────────────────────────────────────────────
  function init() {
    ROOT = document.getElementById('tellimis-plugin');
    if (!ROOT) { console.warn('Tellimisplugina: #tellimis-plugin puudub'); return; }

    if (EJS_KEY && EJS_KEY !== 'ASENDA') {
      const sc = document.createElement('script');
      sc.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
      document.head.appendChild(sc);
    }

    injectCSS();

    const salv = laeKlientLS();
    if (salv) S.klient = salv;

    try {
      if (PAROOL && sessionStorage.getItem('tp_auth') === '1') S.samm = 1;
    } catch {}

    rend();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();

</script>
